version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: global_supply_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gsc_user
      POSTGRES_PASSWORD: gsc_password
      POSTGRES_DB: global_supply_chain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsc_user -d global_supply_chain"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: global_supply_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+psycopg2://gsc_user:gsc_password@db:5432/global_supply_chain
      - APP_NAME=Global Supply Chain Authentication API
      - CORS_ORIGINS=*
      - SECRET_KEY=1bbaf3bb-bfee-46f9-bbfa-bfea370eb0bb
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SENDER_EMAIL=test@example.com
      - SENDER_PASSWORD=dummy_password
      - BLOCKCHAIN_NETWORK=ethereum
      - RATE_LIMIT_AUTH=5/minute
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn run:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: global_supply_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
